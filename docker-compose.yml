services:
  postgres-db:
    image: postgres:18-alpine
    container_name: spyprice_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spyprice_network

  backend-api:
    build: ./backend-api
    container_name: spyprice_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api/app:/app/app
    environment:
      WATCHFILES_FORCE_POLLING: "true"     # hot-reload no Windows
      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - spyprice_network

  pgadmin:
    image: dpage/pgadmin4:9.16
    container_name: spyprice_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - postgres-db
    networks:
      - spyprice_network

volumes:
  postgres_data:

networks:
  spyprice_network:
    driver: bridge
